<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Dashboard - Conductor Tool</title>

  <!-- Shared Stylesheets -->
  <link rel="stylesheet" href="../../css/shared/variables.css">
  <link rel="stylesheet" href="../../css/shared/global.css">
  <link rel="stylesheet" href="../../css/components/navigation.css">

  <!-- Page-specific Stylesheets -->
  <link rel="stylesheet" href="../../css/pages/directory/dashboard.css">
</head>
<body>
  <!-- Navigation will be injected by shared navigation component -->

  <!-- Main Dashboard Container -->
  <main id="dashboard-container" class="dashboard-container">
    <!-- Dashboard content will be dynamically rendered here -->
    <div class="loading">Loading dashboard...</div>
  </main>

  <!-- Footer will be injected by shared navigation component -->

  <!-- Scripts -->
  <script type="module">
    import { renderNavigation, renderFooter } from '../../js/shared/navigation.js';

    // Render navigation and footer
    renderNavigation('directory');
    renderFooter();

    // Import and initialize the dashboard
    import('../../js/pages/directory/class-dashboard/index.js');
  </script>
</body>
</html>
