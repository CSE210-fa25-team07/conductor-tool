<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Conductor Tool</title>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="../css/shared/variables.css">
  <link rel="stylesheet" href="../css/shared/global.css">
  <link rel="stylesheet" href="../css/components/navigation.css">

  <!-- Page-specific styles -->
  <style>
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: var(--space-6);
      padding: var(--space-8);
      max-width: var(--container-2xl);
      margin: 0 auto;
    }

    .feature-card {
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      box-shadow: var(--shadow-lg);
      transition: transform var(--transition-base), box-shadow var(--transition-base);
      cursor: pointer;
      text-align: center;
    }

    .feature-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
    }

    .feature-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto var(--space-4);
      fill: var(--primary-color);
    }

    .feature-title {
      font-size: var(--font-size-2xl);
      margin-bottom: var(--space-3);
      color: var(--primary-color);
    }

    .feature-description {
      color: var(--text-secondary);
      margin-bottom: var(--space-6);
    }

    .dashboard-header {
      text-align: center;
      padding: var(--space-12) var(--space-8) var(--space-8);
      background: linear-gradient(135deg, var(--accent-color) 0%, var(--secondary-color) 100%);
      color: var(--text-inverse);
    }

    .dashboard-header h1 {
      color: var(--text-inverse);
      font-size: var(--font-size-4xl);
      margin-bottom: var(--space-4);
    }

    .dashboard-header p {
      font-size: var(--font-size-lg);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <!-- Navigation will be injected here by JavaScript -->

  <!-- Dashboard Header -->
  <div class="dashboard-header">
    <h1>Welcome to Conductor Tool</h1>
    <p>Your all-in-one course management platform</p>
  </div>

  <!-- Main Dashboard -->
  <main>
    <div class="dashboard-grid" id="features-grid">
      <!-- Feature cards will be dynamically generated -->
    </div>
  </main>

  <!-- Footer will be injected here by JavaScript -->

  <script type="module">
    import { renderNavigation, renderFooter } from '../js/shared/navigation.js';

    // Render navigation and footer
    renderNavigation('dashboard');
    renderFooter();

    // SVG Icons
    const icons = {
      directory: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>',
      standup: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>',
      attendance: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zM9 14H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2zm-8 4H7v-2h2v2zm4 0h-2v-2h2v2zm4 0h-2v-2h2v2z"/></svg>',
      profile: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'
    };

    // Feature cards configuration
    const features = [
      {
        id: 'directory',
        title: 'Directory',
        icon: icons.directory,
        description: 'Browse students, teams, and staff. View profiles, team information, and course roster.',
        href: '/frontend/html/directory/class-dashboard.html'
      },
      {
        id: 'standup',
        title: 'Standup Tool',
        icon: icons.standup,
        description: 'Submit daily standups, track team progress, and view GitHub activity integration.',
        href: '/frontend/html/standup/index.html'
      },
      {
        id: 'attendance',
        title: 'Attendance',
        icon: icons.attendance,
        description: 'Manage meetings, track attendance, and view calendar of course events.',
        href: '/frontend/html/pages/attendance/meeting_list/meeting_list.html'
      },
      {
        id: 'profile',
        title: 'My Profile',
        icon: icons.profile,
        description: 'View and edit your profile, including bio, contact info, and team memberships.',
        href: '/frontend/html/directory/user-profile.html?user=student-1-uuid'
      }
    ];

    // Render feature cards
    const grid = document.getElementById('features-grid');
    features.forEach(feature => {
      const card = document.createElement('a');
      card.href = feature.href;
      card.className = 'feature-card';

      const iconContainer = document.createElement('div');
      iconContainer.className = 'feature-icon';
      iconContainer.innerHTML = feature.icon;

      const title = document.createElement('h2');
      title.className = 'feature-title';
      title.textContent = feature.title;

      const description = document.createElement('p');
      description.className = 'feature-description';
      description.textContent = feature.description;

      const button = document.createElement('button');
      button.className = 'btn';
      button.textContent = `Open ${feature.title}`;

      card.appendChild(iconContainer);
      card.appendChild(title);
      card.appendChild(description);
      card.appendChild(button);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
